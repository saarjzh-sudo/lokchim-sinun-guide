<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1B5E8A" stroke="#DFA517" stroke-width="3"/>

  <!-- Sun rays -->
  <g transform="translate(100,55)" fill="#DFA517" opacity="0.9">
    <rect x="-2" y="-22" width="4" height="14" rx="2"/>
    <rect x="-2" y="-22" width="4" height="14" rx="2" transform="rotate(30)"/>
    <rect x="-2" y="-22" width="4" height="14" rx="2" transform="rotate(60)"/>
    <rect x="-2" y="-22" width="4" height="14" rx="2" transform="rotate(90)"/>
    <rect x="-2" y="-22" width="4" height="14" rx="2" transform="rotate(120)"/>
    <rect x="-2" y="-22" width="4" height="14" rx="2" transform="rotate(150)"/>
    <rect x="-2" y="-22" width="4" height="14" rx="2" transform="rotate(180)"/>
    <rect x="-2" y="-22" width="4" height="14" rx="2" transform="rotate(210)"/>
    <rect x="-2" y="-22" width="4" height="14" rx="2" transform="rotate(240)"/>
    <rect x="-2" y="-22" width="4" height="14" rx="2" transform="rotate(270)"/>
    <rect x="-2" y="-22" width="4" height="14" rx="2" transform="rotate(300)"/>
    <rect x="-2" y="-22" width="4" height="14" rx="2" transform="rotate(330)"/>
    <circle cx="0" cy="0" r="10" fill="#DFA517"/>
  </g>

  <!-- Lion face simplified -->
  <g transform="translate(100,105)">
    <!-- Mane -->
    <ellipse cx="0" cy="-5" rx="38" ry="35" fill="#C8860A" opacity="0.6"/>
    <!-- Face -->
    <ellipse cx="0" cy="0" rx="28" ry="26" fill="#DFA517"/>
    <!-- Eyes -->
    <circle cx="-10" cy="-6" r="4" fill="#1B5E8A"/>
    <circle cx="10" cy="-6" r="4" fill="#1B5E8A"/>
    <circle cx="-9" cy="-7" r="1.5" fill="white"/>
    <circle cx="11" cy="-7" r="1.5" fill="white"/>
    <!-- Nose -->
    <ellipse cx="0" cy="4" rx="5" ry="3.5" fill="#A0620A"/>
    <!-- Mouth -->
    <path d="M-4 9 Q0 14 4 9" fill="none" stroke="#A0620A" stroke-width="1.5"/>
  </g>

  <!-- Text: מוקד אור -->
  <text x="100" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="white" direction="rtl">מוקד אור</text>
  <text x="100" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.7)" direction="rtl">ייעוץ והדרכה בנייני מגינות</text>
</svg>
